services:
  - type: web
    name: intranet-ssff
    env: node
    branch: main
    buildCommand: "npm run build"
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    plan: free
    healthCheckPath: "/"
